<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ETHS Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f6f7fb;
      color: #333;
    }

    header {
      background: #1f4fd8;
      color: white;
      padding: 16px;
    }

    h1 {
      margin: 0 0 4px 0;
      font-size: 22px;
    }

    .subtitle {
      font-size: 13px;
      opacity: 0.9;
    }

    main {
      padding: 16px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 14px;
      color: #666;
    }

    .card .value {
      font-size: 26px;
      font-weight: bold;
      color: #1f4fd8;
    }

    footer {
      padding: 12px;
      text-align: center;
      font-size: 12px;
      color: #666;
    }

    .status {
      margin-top: 8px;
      font-size: 12px;
    }

    .status.ok { color: green; }
    .status.error { color: red; }
  </style>
</head>

<body>

<header>
  <h1>ETHS Dashboard</h1>
  <div class="subtitle">Live data from KoboToolbox</div>
</header>

<main>

  <div class="cards">
    <div class="card">
      <h2>Total Kobo Submissions</h2>
      <div class="value" id="koboCount">—</div>
    </div>

    <div class="card">
      <h2>Block Meetings</h2>
      <div class="value" id="blockMeetings">—</div>
    </div>

    <div class="card">
      <h2>MO Trained</h2>
      <div class="value" id="moTrained">—</div>
    </div>

    <div class="card">
      <h2>Users</h2>
      <div class="value" id="usersCount">—</div>
    </div>
  </div>

  <div id="status" class="status">Loading data…</div>

</main>

<footer>
  Last refresh: <span id="lastUpdated">—</span>
</footer>

<script>
/* ----------------------------------------------------------
   Utility helpers (SAFE AGAINST KOBO DATA)
---------------------------------------------------------- */

const clean = v =>
  (v === undefined || v === null) ? '' : v.toString().trim();

const num = v => {
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
};

async function fetchJSON(path) {
  const url = `${path}?ts=${Date.now()}`; // cache-busting
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Failed to load ${path}`);
  return res.json();
}

/* ----------------------------------------------------------
   Main init
---------------------------------------------------------- */

async function init() {
  try {
    console.log('Loading live data…');

    const [
      koboLatest,
      blockMeetings,
      moTrained,
      users
    ] = await Promise.all([
      fetchJSON('./data/kobo_latest.json'),
      fetchJSON('./data/block_meetings.json'),
      fetchJSON('./data/mo_trained.json'),
      fetchJSON('./data/users.json')
    ]);

    console.log('kobo_latest.json records:', koboLatest.length);

    /* ---------- KPI CALCULATIONS ---------- */

    document.getElementById('koboCount').textContent =
      koboLatest.length;

    document.getElementById('blockMeetings').textContent =
      blockMeetings.length;

    document.getElementById('moTrained').textContent =
      moTrained.length;

    document.getElementById('usersCount').textContent =
      users.length;

    /* ---------- STATUS & TIMESTAMP ---------- */

    document.getElementById('status').textContent =
      '✅ Live data loaded successfully';
    document.getElementById('status').className =
      'status ok';

    document.getElementById('lastUpdated').textContent =
      new Date().toLocaleString();

    /* ---------- SANITY LOG ---------- */
    console.log(
      'Latest Kobo submission:',
      koboLatest[koboLatest.length - 1]
    );

  } catch (err) {
    console.error(err);

    document.getElementById('status').textContent =
      '❌ Failed to load live data';
    document.getElementById('status').className =
      'status error';
  }
}

/* ---------------------------------------------------------- */

init();

</script>

</body>
</html>
